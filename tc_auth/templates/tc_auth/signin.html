{% extends 'tc_auth/base.html' %}

{% load crispy_forms_tags %}

{% block title %}
    Judo humare saath
{% endblock title %}

{% block content %}
    <form action="" method="POST">
        {% csrf_token %}
        {% crispy form %}
        <div class="auth-btns">
            <input type="submit" class="btn btn-primary" value="Signin">
            <a href="{% url 'auth:login' %}" class="btn btn-secondary">Login</a>
        </div>
    </form>
{% endblock content %}
