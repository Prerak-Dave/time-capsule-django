{% extends 'tc_auth/base.html' %}

{% load crispy_forms_tags %}

{% block title %}
    Judo humare saath
{% endblock title %}

{% block content %}
    <form action="" method="POST">
        {% csrf_token %}
        {{ form|crispy }}
        <button type="submit">Signin</button>
    </form>
    {% if exception %}
        <div class="errors">
            <p>{{ exception }}</p>
        </div>
    {% endif %}
{% endblock content %}
