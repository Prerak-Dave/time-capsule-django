{% extends 'tc_auth/base.html' %}

{% load crispy_forms_tags %}

{% block title %}
    Kaun ho tum
{% endblock title %}

{% block content %}
    <form action="" method="POST">
        {% csrf_token %}
        {% crispy form %}
        <div class="auth-btns">
            <input type="submit" class="btn btn-primary" value="Login">
            <a href="{% url 'auth:signin' %}" class="btn btn-secondary">Register</a>
        </div>
    </form>
{% endblock content %}
